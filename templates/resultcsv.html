<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Batch Prediction Analysis</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
    body { 
        background: #f0f2f5; 
        padding: 40px; 
        font-family: 'Inter', sans-serif;
    }
    .chart-container { 
        background: white; 
        padding: 40px; 
        border-radius: 20px; 
        box-shadow: 0 10px 30px rgba(0,0,0,0.08); 
        border-top: 8px solid #764ba2;
    }
    .stat-badge {
        display: inline-block;
        padding: 10px 20px;
        background: #764ba2;
        color: white;
        border-radius: 50px;
        font-size: 1.2rem;
        margin-bottom: 20px;
    }
</style>
</head>
<body>
    <div class="container text-center">
        <div class="chart-container">
            <h2 class="mb-4">Batch Prediction Overview</h2>
            <p class="text-muted">Total Records Processed: <strong>{{ total }}</strong></p>
            
            <div class="my-4">
                {{ graph_html | safe }}
            </div>

            <div class="mt-4">
                <a href="/" class="btn btn-outline-primary">Upload Another File</a>
            </div>
        </div>
    </div>
</body>
</html>
