<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Churn Prediction</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        body { 
            background: var(--primary-gradient); 
            min-height: 100vh;
            padding: 40px 20px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .form-container { 
            background: rgba(255, 255, 255, 0.95); 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.2); 
            max-width: 900px; 
            margin: auto; 
        }
        .section-title { 
            border-left: 5px solid #764ba2; 
            margin: 30px 0 20px 0; 
            padding-left: 15px; 
            color: #4b306a;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-primary {
            background: var(--primary-gradient);
            border: none;
            transition: transform 0.2s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(118, 75, 162, 0.4);
        }
        .form-select, .form-control {
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        .batch-section {
            background: #fdfdfd;
            border: 2px dashed #764ba2;
            border-radius: 15px;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2 class="text-center mb-4">Churn Prediction Input Form</h2>
        <form action="/" method="POST">
            
            <div class="row">
                <h5 class="section-title">Demographics</h5>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Gender</label>
                    <select name="gender" class="form-select" required>
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Senior Citizen (0=No, 1=Yes)</label>
                    <select name="SeniorCitizen" class="form-select" required>
                        <option value="0">0</option>
                        <option value="1">1</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Partner</label>
                    <select name="Partner" class="form-select" required>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Dependents</label>
                    <select name="Dependents" class="form-select" required>
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <h5 class="section-title">Services</h5>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Phone Service</label>
                    <select name="PhoneService" class="form-select">
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Multiple Lines</label>
                    <select name="MultipleLines" class="form-select">
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                        <option value="No phone service">No phone service</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Internet Service</label>
                    <select name="InternetService" class="form-select">
                        <option value="Fiber optic">Fiber optic</option>
                        <option value="DSL">DSL</option>
                        <option value="No">No</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Online Security</label>
                    <select name="OnlineSecurity" class="form-select">
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                        <option value="No internet service">No internet service</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Online Backup</label>
                    <select name="OnlineBackup" class="form-select">
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                        <option value="No internet service">No internet service</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Device Protection</label>
                    <select name="DeviceProtection" class="form-select">
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                        <option value="No internet service">No internet service</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="section-title" style="font-size: 1rem; border: none;">Support & Streaming</label>
                    <label class="form-label">Tech Support</label>
                    <select name="TechSupport" class="form-select">
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                        <option value="No internet service">No internet service</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3 mt-4">
                    <label class="form-label">Streaming TV</label>
                    <select name="StreamingTV" class="form-select">
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                        <option value="No internet service">No internet service</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3 mt-4">
                    <label class="form-label">Streaming Movies</label>
                    <select name="StreamingMovies" class="form-select">
                        <option value="No">No</option>
                        <option value="Yes">Yes</option>
                        <option value="No internet service">No internet service</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <h5 class="section-title">Contract & Billing</h5>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Contract Type</label>
                    <select name="Contract" class="form-select">
                        <option value="Month-to-month">Month-to-month</option>
                        <option value="One year">One year</option>
                        <option value="Two year">Two year</option>
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Paperless Billing</label>
                    <select name="PaperlessBilling" class="form-select">
                        <option value="Yes">Yes</option>
                        <option value="No">No</option>
                    </select>
                </div>
                <div class="col-md-12 mb-3">
                    <label class="form-label">Payment Method</label>
                    <select name="PaymentMethod" class="form-select">
                        <option value="Electronic check">Electronic check</option>
                        <option value="Mailed check">Mailed check</option>
                        <option value="Bank transfer (automatic)">Bank transfer (automatic)</option>
                        <option value="Credit card (automatic)">Credit card (automatic)</option>
                    </select>
                </div>
            </div>

            <div class="row">
                <h5 class="section-title">Usage & Charges</h5>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Tenure (Months)</label>
                    <input type="number" name="tenure" class="form-control" placeholder="e.g. 12" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Monthly Charges</label>
                    <input type="number" step="0.01" name="MonthlyCharges" class="form-control" placeholder="e.g. 75.50" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">Total Charges</label>
                    <input type="text" name="TotalCharges" class="form-control" placeholder="e.g. 1200.50" required>
                </div>
            </div>

            <div class="text-center mt-4">
                <button type="submit" class="btn btn-primary btn-lg w-100">Predict Churn Status</button>
            </div>
           
            </form>
        </div>
        </form>
 <div class="form-container mb-4" >
            <h4 class="section-title">Batch Prediction via CSV</h4>
            <form action="/" method="POST" enctype="multipart/form-data">
                <div class="input-group">
                    <input type="file" name='csv_file' class="form-control" accept=".csv" required>
                    <button class="btn btn-secondary" type="submit">Upload & Predict</button>
                </div>
                <small class="text-muted">Ensure your CSV has columns matching the input features.</small>
    </div>
</body>
</html>
