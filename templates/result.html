<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Result</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
        }
        .result-card { 
            background: white; 
            padding: 50px; 
            border-radius: 25px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
            text-align: center; 
            max-width: 450px; 
            width: 100%; 
        }
        .prediction-text { 
            font-size: 3rem; 
            font-weight: 800; 
            margin: 10px 0; 
        }
        .churn-yes { color: #e74c3c; text-shadow: 0 2px 10px rgba(231, 76, 60, 0.2); }
        .churn-no { color: #2ecc71; text-shadow: 0 2px 10px rgba(46, 204, 113, 0.2); }
        .btn-back {
            background: #f8f9fa;
            color: #764ba2;
            border: 2px solid #764ba2;
            font-weight: 600;
        }
        .btn-back:hover {
            background: #764ba2;
            color: white;
        }
    </style>
</head>
<body>

    <div class="result-card">
        <h2 class="text-secondary">Prediction Result</h2>
        <hr>
        
        <p class="lead">The model predicts the customer will:</p>
        
        <div class="prediction-text">
            {% if prediction == 1 or prediction == '1' %}
                <span class="churn-yes">CHURN</span>
                <p style="font-size: 1rem; color: #6c757d;">⚠️ This customer is likely to leave.</p>
            {% else %}
                <span class="churn-no">NOT CHURN</span>
                <p style="font-size: 1rem; color: #6c757d;">✅ This customer is likely to stay.</p>
            {% endif %}
        </div>

        <div class="mt-4">
            <a href="/" class="btn btn-primary btn-lg w-100">
                <i class="bi bi-arrow-left"></i> Back to Predictor
            </a>
        </div>
    </div>

</body>
</html>
